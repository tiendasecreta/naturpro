<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venta Chat - Centro de Atención</title>

  <!-- PWA Metadata -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --accent-color: #25d366;
      --text-color: #ffffff;
      --text-secondary: #a0a0a0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 1.5rem;
      margin-top: 10px;
      font-weight: 700;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 8px;
      line-height: 1.4;
    }

    .brand-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .brand-card {
      background-color: var(--card-bg);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--text-color);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .brand-card:active {
      transform: scale(0.98);
      border-color: var(--accent-color);
    }

    .brand-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      font-size: 1.6rem;
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .chat-badge {
      background-color: #25d36622;
      color: var(--accent-color);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <span>👋</span>
      <h1>¡Hola! Bienvenido a nuestro centro de atención</h1>
      <p>¿Qué marca o producto deseas solicitar hoy?</p>
    </div>

    <div class="brand-list">
      <!-- Natural Medix -->
      <a href="https://wa.me/573000000000?text=%C2%A1Hola!%20Deseo%20solicitar%20informaci%C3%B3n%20y%20precios%20de%20Natural%20Medix" class="brand-card" target="_blank">
        <div class="brand-info">
          <span class="brand-icon">🌿</span>
          <span class="brand-name">Natural Medix</span>
        </div>
        <span class="chat-badge">Pedir</span>
      </a>

      <!-- Star Natural -->
      <a href="https://wa.me/573000000000?text=%C2%A1Hola!%20Deseo%20solicitar%20informaci%C3%B3n%20y%20precios%20de%20Star%20Natural" class="brand-card" target="_blank">
        <div class="brand-info">
          <span class="brand-icon">⭐</span>
          <span class="brand-name">Star Natural</span>
        </div>
        <span class="chat-badge">Pedir</span>
      </a>

      <!-- Naturcap -->
      <a href="https://wa.me/573000000000?text=%C2%A1Hola!%20Deseo%20solicitar%20informaci%C3%B3n%20y%20precios%20de%20Naturcap" class="brand-card" target="_blank">
        <div class="brand-info">
          <span class="brand-icon">💊</span>
          <span class="brand-name">Naturcap</span>
        </div>
        <span class="chat-badge">Pedir</span>
      </a>

      <!-- Naturpro -->
      <a href="https://wa.me/573000000000?text=%C2%A1Hola!%20Deseo%20solicitar%20informaci%C3%B3n%20y%20precios%20de%20Naturpro" class="brand-card" target="_blank">
        <div class="brand-info">
          <span class="brand-icon">🟢</span>
          <span class="brand-name">Naturpro</span>
        </div>
        <span class="chat-badge">Pedir</span>
      </a>
    </div>

    <div class="footer">
      <p>Atención directa por WhatsApp | Venta.chat</p>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
